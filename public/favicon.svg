<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" rx="14" fill="#131110"/>

  <defs>
    <!-- Bright bar gradient: gold highlight left → dark amber right -->
    <linearGradient id="gB" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#F5DC68"/>
      <stop offset="28%"  stop-color="#C9A030"/>
      <stop offset="100%" stop-color="#6A4210"/>
    </linearGradient>
    <!-- Dim bar gradient for outer shorter bars -->
    <linearGradient id="gD" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#C9A030"/>
      <stop offset="30%"  stop-color="#A07020"/>
      <stop offset="100%" stop-color="#503010"/>
    </linearGradient>
    <!-- Thin inner highlight overlay -->
    <linearGradient id="gH" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="40%"  stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 4 parallelogram bars: skewX(-9) gives the italic right-lean -->
  <g transform="translate(10, 0) skewX(-9)">
    <!-- Bar 1 — outer left, medium height -->
    <rect x="8"  y="36" width="14" height="52" fill="url(#gD)"/>
    <rect x="8"  y="36" width="4"  height="52" fill="url(#gH)"/>

    <!-- Bar 2 — tallest -->
    <rect x="27" y="8"  width="14" height="80" fill="url(#gB)"/>
    <rect x="27" y="8"  width="4"  height="80" fill="url(#gH)"/>

    <!-- Bar 3 — second tallest -->
    <rect x="46" y="18" width="14" height="70" fill="url(#gB)"/>
    <rect x="46" y="18" width="4"  height="70" fill="url(#gH)"/>

    <!-- Bar 4 — outer right, shorter -->
    <rect x="65" y="46" width="14" height="42" fill="url(#gD)"/>
    <rect x="65" y="46" width="4"  height="42" fill="url(#gH)"/>
  </g>
</svg>
